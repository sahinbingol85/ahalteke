<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Giriş | Ahal Teke</title>
    
    <link rel="manifest" href="/manifest_rezervasyon.json">
    <meta name="theme-color" content="#0a2342">
    <link rel="apple-touch-icon" href="https://i.ibb.co/HTPhptVQ/logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 5px solid #0a2342; }
        .btn-custom { background-color: #28a745; color: white; font-weight: bold; border-radius: 10px; padding: 12px; transition: 0.3s; }
        .btn-custom:hover { background-color: #218838; color: white; }
        .form-control { border-radius: 10px; padding: 12px; background-color: #f8f9fa; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="color: #0a2342; font-weight: bold; margin-bottom: 20px;">
            <i class="fa-solid fa-tennis-ball text-success"></i> Ahal Teke
        </h2>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-info py-2 small fw-bold">{{ message }}</div>
            {% endfor %}
        {% else %}
            <p class="text-muted mb-4">Sisteme girmek için bilgilerinizi yazın.</p>
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3 text-start">
                <label class="form-label fw-bold text-muted small">Kullanıcı Adı</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label fw-bold text-muted small">Şifre</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            
            <input type="hidden" name="next" value="/rezervasyon/">
            <button type="submit" class="btn btn-custom w-100"><i class="fa-solid fa-right-to-bracket me-2"></i>GİRİŞ YAP</button>
        </form>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>
</html>
