<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifre Değiştir - Ahal Teke</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f6f9; text-align: center; }
        .form-container { background: white; padding: 20px; border-radius: 10px; display: inline-block; text-align: left; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { background: #0a2342; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
        .back-link { display: block; margin-top: 15px; color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Şifre Değiştir</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Şifreyi Güncelle</button>
        </form>
        <a href="{% url 'rezervasyon_paneli' %}" class="back-link">← Panele Geri Dön</a>
    </div>
</body>
</html>
